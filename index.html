<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>¡Dibuja y Adivina!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/offline/tesseract.min.js"></script>
</head>
<body>

    <header>
        <h1>✏️ ¡Dibuja una letra!</h1>
        <p class="subtitle">Escribe con el dedo o el mouse — la IA adivina sola</p>
        <a href="./learn.html" style="display:block;text-align:center;margin-top:4px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;color:#4caf50;text-decoration:none;">📚 Aprender a escribir →</a>
    </header>

    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="canvas" aria-label="Área de dibujo"></canvas>
        <div class="canvas-hint" id="canvasHint">Dibuja aquí 🖊️</div>
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result-area">
        <span class="result-label">La letra es:</span>
        <div id="output" class="empty">—</div>
    </div>

    <div class="controls">
        <button id="btn-clear" onclick="clearCanvas()">🗑 Borrar</button>
        <button id="btn-speak" onclick="replaySpeech()">🔊 Escuchar</button>
    </div>

    <div class="status-bar" id="statusBar">Esperando trazo…</div>

    <script src="./js/offline/letters.js"></script>
    <script src="./js/offline/geometry.js"></script>
    <script src="./js/offline/local_ocr.js"></script>
    <script src="./js/online/google_api.js"></script>
    <script src="./js/ui/app.js"></script>
</body>
</html>
