<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OCR - Reconocimiento de Palabras</title>
<script src="./tesseract.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f4f7f6; 
            padding: 20px;
        }
        /* He ensanchado el canvas para que quepan palabras completas */
        canvas { 
            border: 3px solid #4a90e2; 
            background: white; 
            border-radius: 10px; 
            cursor: crosshair; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .controls { margin: 20px; }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 5px; 
            color: white; 
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-blue { background: #4a90e2; }
        .btn-blue:hover { background: #357abd; }
        .btn-red { background: #e74c3c; margin-right: 10px; }
        .btn-red:hover { background: #c0392b; }
        
        #status { color: #666; font-style: italic; height: 20px; margin-bottom: 10px; }
        
        #output { 
            font-size: 60px; 
            margin-top: 20px; 
            /* Fuente cursiva para el resultado */
            font-family: 'Brush Script MT', cursive; 
            color: #2c3e50; 
            border-bottom: 2px solid #ccc;
            min-width: 200px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Dibuja una palabra o letra</h2>
    <canvas id="canvas" width="500" height="300"></canvas>

    <div class="controls">
        <button class="btn-red" onclick="clearCanvas()">Borrar</button>
        <button class="btn-blue" onclick="recognizeDrawing()">¿Qué dice aquí?</button>
    </div>

    <div id="status">Esperando trazo...</div>
    <div id="output"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        let drawing = false;

        // Configuración del dibujo
        ctx.lineWidth = 12; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'black';

        // Eventos de ratón
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mousemove', draw);

        // Soporte para pantallas táctiles (móvil)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); stopDrawing(); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });

        function startDrawing() { drawing = true; }
        function stopDrawing() { drawing = false; ctx.beginPath(); }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            output.innerText = "";
            status.innerText = "Lienzo limpio.";
        }

        async function recognizeDrawing() {
            status.innerText = "IA analizando... (esto puede tardar unos segundos)";
            output.innerText = "";

            // Capturamos la imagen del canvas
            const dataUrl = canvas.toDataURL('image/png');

            try {
                // Usamos Tesseract con idioma español
                const result = await Tesseract.recognize(dataUrl, 'spa');

                // Limpiamos espacios y saltos de línea
                const cleanText = result.data.text.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ]/g, '').trim();
                
                if (cleanText) {
                    output.innerText = cleanText;
                    status.innerText = "¡Detección exitosa!";
                } else {
                    status.innerText = "No se detectó nada claro. ¡Intenta escribir más firme!";
                }
            } catch (err) {
                status.innerText = "Error en el reconocimiento.";
                console.error(err);
            }
        }
    </script>

</body>

</html>
