<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>¡Dibuja y Adivina! - Reconocimiento de Letras y Números con IA</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    
    <!-- SEO Metadata -->
    <meta name="description" content="Aplicación web interactiva que utiliza IA para reconocer letras y números dibujados a mano. ¡Dibuja, adivina y aprende de forma divertida!">
    <meta name="keywords" content="OCR, dibujo, IA, aprendizaje, letras, números, tesseract, reconocimiento de escritura, educación">
    <meta name="author" content="HectorDanielAyarachiFuentes">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="¡Dibuja y Adivina! - IA de Escritura">
    <meta property="og:description" content="Dibuja letras y números en pantalla y deja que la IA los reconozca al instante.">
    <meta property="og:image" content="./assets/favicon.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="¡Dibuja y Adivina! - IA de Escritura">
    <meta property="twitter:description" content="Reconocimiento inteligente de trazos hecho fácil y divertido.">
    <meta property="twitter:image" content="./assets/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/offline/tesseract.min.js"></script>
</head>

<body>

    <header>
        <div class="header-content">
            <h1>✏️ ¡Dibuja una letra o número! 🔢</h1>
            <p class="subtitle">Escribe con el dedo o el mouse — la IA adivina sola</p>
            <a href="./learn.html" class="learn-link">
                <span>📚 Aprender a escribir</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </header>

    <div class="canvas-wrapper" id="canvasWrapper">
        <button class="btn-expand" id="btn-expand" title="Ampliar área" onclick="toggleExpand()">⛶</button>
        <canvas id="canvas" aria-label="Área de dibujo"></canvas>
        <div class="canvas-hint" id="canvasHint">¡Dibuja aquí una letra o número! 🖊️</div>
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result-area">
        <span class="result-label">La letra o número es:</span>
        <div id="output" class="empty">—</div>
    </div>

    <div class="controls">
        <button id="btn-clear" onclick="clearCanvas()">🗑 Borrar</button>
        <button id="btn-speak" onclick="replaySpeech()">🔊 Escuchar</button>
    </div>

    <div class="status-bar" id="statusBar">Esperando trazo…</div>

    <script src="./js/offline/letters.js"></script>
    <script src="./js/offline/geometry.js"></script>
    <script src="./js/offline/local_ocr.js"></script>
    <script src="./js/online/google_api.js"></script>
    <script src="./js/ui/app.js"></script>
</body>

</html>
